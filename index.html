<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do_List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Advance To_DO List</h1>

        <div class="add-task">
            <input type="text" placeholder="Add a new task...">
            <button class="addbtn">Add Task</button>
        </div>

        <div class="filters">
            <button class="filters-btn">All</button>
            <button class="filters-btn">Completed</button>
            <button class="filters-btn">Pending</button>
        </div>

        <div class="main-body">
            <ul class="task-list">
                <li class="task-item completed">
                    <div class="task-left">
                        <input type="checkbox" checked>
                        <span>Learn JavaScript</span>
                    </div>

                    <div class="task-actions">
                        <button class="edit">Edit</button>
                        <button class="delete">Delete</button>
                    </div>
                </li>

                <li class="task-item">
                    <div class="task-left">
                        <input type="checkbox" >
                        <span>Build a To-Do App</span>
                    </div>

                    <div class="task-actions">
                        <button class="edit">Edit</button>
                        <button class="delete">Delete</button>
                    </div>
                </li>

                <li class="task-item">
                    <div class="task-left">
                        <input type="checkbox" >
                        <span>Go For a Walk</span>
                    </div>

                    <div class="task-actions">
                        <button class="edit">Edit</button>
                        <button class="delete">Delete</button>
                    </div>
                </li>

                <li class="task-item editing">
                <div class="task-left">
                    <input type="checkbox" />
                    <input type="text" value="Read a Book" class="edit-input" />
                </div>
                <div class="task-actions">
                    <button class="delete">Delete</button>
                </div>
            </li>
            </ul>

        </div>

        <div class="footer">
            <span>3 Task(1 Completed)</span>
            <button class="clear-btn">Clear Completed</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
